---
- name: Ensure ngircd cert dir
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/ngircd/certs"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0700"

- name: Template post renewal script
  ansible.builtin.template:
    src: ngircd.post.renew.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/post/ngircd.post.renew.sh
    owner: root
    group: root
    mode: "0700"
    force: true

- name: Run post renewal script
  ansible.builtin.command: /etc/letsencrypt/renewal-hooks/post/ngircd.post.renew.sh
  register: ngircd_post_renewal_tmp
  changed_when: "ngircd_post_renewal_tmp.rc == 0"
...
