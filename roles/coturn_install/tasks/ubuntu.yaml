---
- name: Ensure coturn directories
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/coturn/config"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0755"

- name: Template compose file
  ansible.builtin.template:
    src: coturn.compose.yaml.j2
    dest: "{{ ansible_facts['user_dir'] }}/coturn/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: "0600"
    force: true

- name: Copy turnserver conf
  ansible.builtin.copy:
    src: "turnserver.conf/{{ ansible_facts['hostname'] }}"
    dest: "{{ ansible_facts['user_dir'] }}/coturn/config/turnserver.conf"
    owner: "{{ ansible_user }}"
    mode: "0644"
    force: true

- name: Template systemd service
  ansible.builtin.template:
    src: coturn.service.j2
    dest: /etc/systemd/system/coturn.service
    owner: root
    group: root
    mode: "0644"
    force: true

- name: Start coturn
  ansible.builtin.systemd_service:
    name: coturn.service
    state: restarted
    enabled: true
    masked: false
    daemon_reload: true
...
