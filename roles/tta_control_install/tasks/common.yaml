---
- name: Ensure tta_control directories
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/{{ tta_control_name }}/data/{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0700"
  loop:
    - thelounge
    - filebrowser

- name: Template compose file
  ansible.builtin.template:
    src: tta.control.compose.yaml.j2
    dest: "{{ ansible_facts['user_dir'] }}/{{ tta_control_name }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: "0600"
    force: true

- name: Template control env
  ansible.builtin.template:
    src: "tta.control.env.j2"
    dest: "{{ ansible_facts['user_dir'] }}/{{ tta_control_name }}/control.env"
    owner: "{{ ansible_user }}"
    mode: "0600"
    force: true
...
