---
- name: Template transmission systemd service
  ansible.builtin.template:
    src: transmission.service.j2
    dest: /etc/systemd/system/{{ service.name }}.service
    owner: root
    group: root
    mode: "0644"
    force: true

- name: Start transmission
  ansible.builtin.systemd_service:
    name: "{{ service.name }}.service"
    state: restarted
    enabled: true
    masked: false
    daemon_reload: true

- name: Wait for transmission to be ready
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ service.rpc_port }}"
    timeout: 300
    state: started
...
