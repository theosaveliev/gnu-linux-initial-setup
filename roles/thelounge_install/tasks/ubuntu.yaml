---
- name: Template systemd service
  ansible.builtin.template:
    src: thelounge.service.j2
    dest: /etc/systemd/system/thelounge.service
    owner: root
    group: root
    mode: "0644"
    force: true

- name: Start thelounge
  ansible.builtin.systemd_service:
    name: thelounge.service
    state: restarted
    enabled: true
    masked: false
    daemon_reload: true

- name: Wait for thelounge to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ thelounge_port }}"
    timeout: 300
    state: started
...
