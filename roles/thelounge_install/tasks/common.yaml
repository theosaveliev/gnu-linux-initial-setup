---
- name: Ensure thelounge directories
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/{{ thelounge_name }}/config"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0700"

- name: Copy config js
  ansible.builtin.copy:
    src: "{{ thelounge_name }}/{{ ansible_facts['hostname'] }}"
    dest: "{{ ansible_facts['user_dir'] }}/{{ thelounge_name }}/config/config.js"
    owner: "{{ ansible_user }}"
    mode: "0600"
    force: true

- name: Copy logo svg
  ansible.builtin.copy:
    src: "thelounge_logo.svg"
    dest: "{{ ansible_facts['user_dir'] }}/{{ thelounge_name }}/thelounge_logo.svg"
    owner: "{{ ansible_user }}"
    mode: "0400"
    force: true

- name: Template compose file
  ansible.builtin.template:
    src: thelounge.compose.yaml.j2
    dest: "{{ ansible_facts['user_dir'] }}/{{ thelounge_name }}/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: "0600"
    force: true
...
