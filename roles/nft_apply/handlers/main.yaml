---
- name: NftablesRestart
  ansible.builtin.systemd_service:
    name: nftables.service
    state: restarted

- name: DockerRestartIfRunning
  ansible.builtin.systemd_service:
    name: docker.service
    state: restarted
  when: ansible_facts["services"]["docker.service"]["state"] | default("stopped") == "running"
...
