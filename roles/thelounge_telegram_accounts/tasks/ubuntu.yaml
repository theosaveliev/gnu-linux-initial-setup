---
- name: Template systemd service
  ansible.builtin.template:
    src: thelounge.telegram.accounts.service.j2
    dest: /etc/systemd/system/thelounge-telegram-accounts.service
    owner: root
    group: root
    mode: "0644"
    force: true

- name: Start thelounge telegram accounts
  ansible.builtin.systemd_service:
    name: thelounge-telegram-accounts.service
    state: restarted
    enabled: true
    masked: false
    daemon_reload: true
...
