---
- name: Read accounts json
  ansible.builtin.slurp:
    src: "{{ item }}"
  register: thelounge_users_copy_json
  loop: "{{ lookup('fileglob', 'thelounge.users/*.json', wantlist=true) }}"
  delegate_to: localhost
  become: false

- name: Filter accounts json
  ansible.builtin.copy:
    dest: "{{ item.source }}"
    content: "{{ filtered | to_nice_json }}\n"
    mode: preserve
  vars:
    filtered: "{{ item.content | b64decode | from_json | dict2items | selectattr('key', 'in', ['password', 'log']) | items2dict }}"
  loop: "{{ thelounge_users_copy_json.results }}"
  delegate_to: localhost
  become: false

- name: Replace users dir
  ansible.posix.synchronize:
    src: thelounge.users/
    dest: "{{ ansible_facts['user_dir'] }}/thelounge/config/users"
    archive: true
    recursive: true
    delete: true
    mode: "push"
    rsync_opts:
      - "--include=*.json"
      - "--exclude=*"

- name: Update file ownership
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/thelounge/config/users"
    owner: "{{ ansible_user }}"
    state: directory
    recurse: true

- name: Update directory permissions
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/thelounge/config/users"
    owner: "{{ ansible_user }}"
    state: directory
    mode: "0700"
...
