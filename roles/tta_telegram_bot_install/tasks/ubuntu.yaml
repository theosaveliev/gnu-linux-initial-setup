---
- name: Template systemd service
  ansible.builtin.template:
    src: tta.telegram.bot.service.j2
    dest: "/etc/systemd/system/{{ tta_telegram_bot_name }}.service"
    owner: root
    group: root
    mode: "0644"
    force: true

- name: Start tta telegram bot
  ansible.builtin.systemd_service:
    name: "{{ tta_telegram_bot_name }}.service"
    state: restarted
    enabled: true
    masked: false
    daemon_reload: true

- name: Wait for tta_telegram_bot to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ tta_telegram_bot_port }}"
    timeout: 300
    state: started
...
