---
- name: Template systemd service
  ansible.builtin.template:
    src: ngircd.service.j2
    dest: /etc/systemd/system/ngircd.service
    owner: root
    group: root
    mode: "0644"
    force: true

- name: Start ngircd
  ansible.builtin.systemd_service:
    name: ngircd.service
    state: restarted
    enabled: true
    masked: false
    daemon_reload: true

- name: Wait for ngircd to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ ngircd_tls_port }}"
    timeout: 300
    state: started

- name: Install irssi
  ansible.builtin.apt:
    state: present
    update_cache: true
    cache_valid_time: 3600
    name: irssi
...
