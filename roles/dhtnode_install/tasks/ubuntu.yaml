---
- name: Ensure dhtnode directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/dhtnode"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0755"

- name: Template compose file
  ansible.builtin.template:
    src: dhtnode.compose.yaml.j2
    dest: "{{ ansible_facts['user_dir'] }}/dhtnode/compose.yaml"
    owner: "{{ ansible_user }}"
    mode: "0600"
    force: true

- name: Template systemd service
  ansible.builtin.template:
    src: dhtnode.service.j2
    dest: /etc/systemd/system/dhtnode.service
    owner: root
    group: root
    mode: "0644"
    force: true

- name: Start dhtnode
  ansible.builtin.systemd_service:
    name: dhtnode.service
    state: restarted
    enabled: true
    masked: false
    daemon_reload: true
...
