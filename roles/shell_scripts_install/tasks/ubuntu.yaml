---
- name: Ensure shell scripts directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/{{ shell_scripts_name }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0700"

- name: Template shell scripts
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ ansible_facts['user_dir'] }}/{{ shell_scripts_name }}/{{ item }}"
    owner: "{{ ansible_user }}"
    mode: "0700"
    force: true
  loop:
    - whos_pending
    - move_accounts
    - notify_users
    - set_time
    - reset_filebrowser_volumes
    - reset_filebrowser_users
...
