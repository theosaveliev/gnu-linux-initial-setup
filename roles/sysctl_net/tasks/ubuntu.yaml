---
- name: Set max socket size
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: 16777216
    state: present
    sysctl_set: true
    reload: true
  loop:
    - "net.core.rmem_max"
    - "net.core.wmem_max"

- name: Enable fair queue discipline
  ansible.posix.sysctl:
    name: "net.core.default_qdisc"
    value: "fq"
    state: present
    sysctl_set: true
    reload: true

- name: Enable BBR TCP congestion control
  ansible.posix.sysctl:
    name: "net.ipv4.tcp_congestion_control"
    value: "bbr"
    state: present
    sysctl_set: true
    reload: true
...
